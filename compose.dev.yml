# compose.dev.yml
# ─────────────────────────────────────────────────────────────
# Development overrides
# Usage: docker compose -f compose.base.yml -f compose.dev.yml up --build
# ─────────────────────────────────────────────────────────────

services:

  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile.dev
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - /app/node_modules
      - /app/apps/backend/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile.dev
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - /app/node_modules
      - /app/apps/frontend/node_modules
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3000